name: mymusicapp
description: "YouTube Audio Downloader"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # YouTube & Audio
  youtube_explode_dart: ^3.0.5
  just_audio: ^0.9.40
  audio_service: ^0.18.15
  audio_session: ^0.1.21

  # Auth & WebView
  webview_flutter: ^4.10.0

  # IAP
  in_app_purchase: ^3.2.0

  # State Management
  provider: ^6.1.2

  # Storage & Files
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  file_picker: ^8.1.6
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.3
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1

  # HTTP & Speech
  http: ^1.2.0
  speech_to_text: ^7.0.0

  # Utility
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  generate: true
  uses-material-design: true
